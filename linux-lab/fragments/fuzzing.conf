# Kernel config fragment for syzkaller fuzzing
# Apply alongside debug.conf for full fuzzing support.
# Adds KCOV coverage instrumentation and KASAN memory error detection.

# Coverage instrumentation (required by syzkaller)
CONFIG_KCOV=y
CONFIG_KCOV_INSTRUMENT_ALL=y
CONFIG_KCOV_ENABLE_COMPARISONS=y

# KASAN: kernel address sanitizer (detect use-after-free, out-of-bounds)
CONFIG_KASAN=y
CONFIG_KASAN_GENERIC=y
# OUTLINE mode uses less memory than INLINE; better for TCG (no KVM)
CONFIG_KASAN_OUTLINE=y

# Debug info for crash symbolization
CONFIG_DEBUG_INFO=y
CONFIG_DEBUG_INFO_DWARF4=y
# CONFIG_DEBUG_INFO_REDUCED is not set

# Fault injection (enables syzkaller to trigger error paths)
CONFIG_FAULT_INJECTION=y
CONFIG_FAULT_INJECTION_DEBUG_FS=y
CONFIG_FAILSLAB=y
CONFIG_FAIL_PAGE_ALLOC=y

# Namespace support (needed for some syscall fuzzing)
CONFIG_USER_NS=y
CONFIG_NET_NS=y
CONFIG_PID_NS=y
CONFIG_IPC_NS=y

# Required: no address randomization (syzkaller tracks addresses)
# CONFIG_RANDOMIZE_BASE is not set

# Helpful for catching kernel bugs during fuzzing
CONFIG_DEBUG_KMEMLEAK=y
CONFIG_LOCKDEP=y
CONFIG_PROVE_LOCKING=y
CONFIG_DEBUG_ATOMIC_SLEEP=y
CONFIG_STACKTRACE=y
CONFIG_KALLSYMS=y
CONFIG_KALLSYMS_ALL=y
