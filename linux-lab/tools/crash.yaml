key: "crash"
repo_url: "https://github.com/crash-utility/crash.git"
checkout_dir: "build/linux-lab/tools/crash"
build_policy: "host-build"
prepare_commands:
  - ["make", "configure"]
  - ["make", "gdb_files"]
  - ["make", "gdb_unzip"]
build_commands:
  - ["make"]
  - ["make", "extensions"]
guest_build_commands: []
post_prepare_asset_copies:
  - from: "linux-lab/tools/assets/crash/extensions/"
    to: "extensions/"
