key: kernel-hook-framework
kind: module
category: security
source: linux-lab/examples/modules/security/kernel-hook-framework
origin: ../qulk/modules/kernel-hook-framework
build_mode: custom-make
build_commands:
- - make
  - -C
  - '{entry_root}/src'
  - '{arch}'
  - KDIR={build_root}
  - CROSS_COMPILE={toolchain_prefix}
- - make
  - -C
  - '{entry_root}/sample'
  - '{arch}'
  - KDIR={build_root}
  - CROSS_COMPILE={toolchain_prefix}
runtime_helpers:
- guest_insmod
- guest_rmmods
tags:
- module
- security
- kernel-hook-framework
groups:
- modules-all
enabled: true
notes: Imported from qulk with explicit linux-lab arch-aware build commands.
